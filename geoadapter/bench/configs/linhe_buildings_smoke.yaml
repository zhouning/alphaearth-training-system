experiment:
  name: linhe_buildings_smoke
  task: segmentation
  dataset: linhe_buildings
  dataset_root: .
  num_classes: 2
  epochs: 8
  batch_size: 8
  seeds: [42]
  split_mode: patch             # smoke: patch-level random split (3-scene pool has no cross-scene generalization hope)
  positive_min_share: 0.05      # synthetic threshold=140 → keep patches with >=5% positive
  max_samples: 256
  val_max_samples: 64

modalities:
  - preset: rgb_3band

methods:
  - name: linear_probe
    adapter: zero_pad
    peft: null
  - name: houlsby
    adapter: zero_pad
    peft: houlsby
    bottleneck_dim: 64

training:
  lr: 1.0e-3
  lr_peft: 1.0e-4
  scheduler: cosine
  weight_decay: 0.01

prithvi:
  pretrained: true
  checkpoint: data/weights/prithvi/Prithvi_100M.pt
