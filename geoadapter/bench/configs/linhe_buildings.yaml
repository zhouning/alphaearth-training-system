experiment:
  name: linhe_buildings_segmentation_v4
  task: segmentation
  dataset: linhe_buildings
  dataset_root: .
  num_classes: 2
  epochs: 30
  batch_size: 16
  seeds: [42, 123, 456]
  positive_min_share: 0.02    # raise threshold so each patch has ≥2% building, easier signal
  max_samples: 2000
  val_max_samples: 400

modalities:
  - preset: rgb_3band

methods:
  - name: linear_probe
    adapter: zero_pad
    peft: null
  - name: houlsby
    adapter: zero_pad
    peft: houlsby
    bottleneck_dim: 64

training:
  lr: 1.0e-3
  lr_peft: 1.0e-4
  scheduler: cosine
  weight_decay: 0.01
  # v3 (focal γ=2) 仍退化 (train precision=0.69 但 recall=0.017),
  # 模型只在极确信时预测建筑. v4 三件事联动:
  # 1. positive_min_share 0.005→0.02, train 集平均建筑占比从 2.65% 升到 ~5%
  # 2. focal γ 2→4, 更激进 down-weight 已分对的简单背景像素
  # 3. focal alpha [0.25, 0.75], 给正样本 3× 类权重 (RetinaNet 标准 α=0.25 反 highlights 多数类, 这里我们要反过来)
  loss: focal
  focal_gamma: 4.0
  class_weights: [0.25, 0.75]

prithvi:
  pretrained: true
  checkpoint: data/weights/prithvi/Prithvi_100M.pt
