experiment:
  name: linhe_buildings_segmentation_v3
  task: segmentation
  dataset: linhe_buildings
  dataset_root: .
  num_classes: 2
  epochs: 30
  batch_size: 16
  seeds: [42, 123, 456]
  positive_min_share: 0.005   # drop near-empty patches; demo focuses on buildings
  max_samples: 2000           # cap per split for tight turnaround; raise after smoke

modalities:
  - preset: rgb_3band

methods:
  - name: linear_probe
    adapter: zero_pad
    peft: null
  - name: houlsby
    adapter: zero_pad
    peft: houlsby
    bottleneck_dim: 64

training:
  lr: 1.0e-3
  lr_peft: 1.0e-4
  scheduler: cosine
  weight_decay: 0.01
  # OSM 真标签下 building 像素仅 ~2.2%. v2 用 [1.0, 50.0] CE 矫枉过正
  # (mIoU 全部退化到 0.36-0.40, 模型偏向预测前景). 改用 focal loss
  # γ=2 自适应平衡, 不依赖人工调权重 (alpha=null), 是稀疏 seg 行业标准.
  loss: focal
  focal_gamma: 2.0

prithvi:
  pretrained: true
  checkpoint: data/weights/prithvi/Prithvi_100M.pt
