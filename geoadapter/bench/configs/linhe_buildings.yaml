experiment:
  name: linhe_buildings_segmentation_v2
  task: segmentation
  dataset: linhe_buildings
  dataset_root: .
  num_classes: 2
  epochs: 30
  batch_size: 16
  seeds: [42, 123, 456]
  positive_min_share: 0.005   # drop near-empty patches; demo focuses on buildings
  max_samples: 2000           # cap per split for tight turnaround; raise after smoke

modalities:
  - preset: rgb_3band

methods:
  - name: linear_probe
    adapter: zero_pad
    peft: null
  - name: houlsby
    adapter: zero_pad
    peft: houlsby
    bottleneck_dim: 64

training:
  lr: 1.0e-3
  lr_peft: 1.0e-4
  scheduler: cosine
  weight_decay: 0.01
  # OSM 真标签下 building 像素仅 ~2.2%, 不加类权重 CE loss 让模型
  # 退化为常量预测背景 (mIoU 0.50 ≈ always-neg). 50× 权重让正样本梯度
  # 主导, 模型有动力学建筑判别. 可调 30-100 找最佳点.
  class_weights: [1.0, 50.0]

prithvi:
  pretrained: true
  checkpoint: data/weights/prithvi/Prithvi_100M.pt
